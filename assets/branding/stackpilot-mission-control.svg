<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">StackPilot mission control</title>
  <desc id="desc">StackPilot 任务控制台蓝图，展示输入信号、硬件扫描、规则引擎、推荐报告、可审查安装计划、安全审计、dry-run 预览和审查输出。</desc>
  <defs>
    <linearGradient id="bg" x1="38" y1="18" x2="1168" y2="438" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06111f" />
      <stop offset="0.5" stop-color="#071a2f" />
      <stop offset="1" stop-color="#24114a" />
    </linearGradient>
    <linearGradient id="surface" x1="55" y1="64" x2="1130" y2="362" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b2a43" stop-opacity="0.56" />
      <stop offset="0.5" stop-color="#0a1d32" stop-opacity="0.3" />
      <stop offset="1" stop-color="#29164d" stop-opacity="0.48" />
    </linearGradient>
    <linearGradient id="mainFlow" x1="240" y1="178" x2="994" y2="178" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee" />
      <stop offset="0.36" stop-color="#60a5fa" />
      <stop offset="0.68" stop-color="#a78bfa" />
      <stop offset="1" stop-color="#f472b6" />
    </linearGradient>
    <linearGradient id="safeFlow" x1="430" y1="322" x2="782" y2="322" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67e8f9" />
      <stop offset="0.58" stop-color="#34d399" />
      <stop offset="1" stop-color="#f59e0b" />
    </linearGradient>
    <linearGradient id="systemPulse" x1="248" y1="234" x2="1002" y2="76" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee" stop-opacity="0" />
      <stop offset="0.34" stop-color="#22d3ee" stop-opacity="0.36" />
      <stop offset="0.7" stop-color="#a78bfa" stop-opacity="0.34" />
      <stop offset="1" stop-color="#f472b6" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="cardFill" x1="0" y1="0" x2="154" y2="88" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f2c4c" stop-opacity="0.92" />
      <stop offset="1" stop-color="#1b1744" stop-opacity="0.92" />
    </linearGradient>
    <linearGradient id="inputFill" x1="54" y1="98" x2="238" y2="338" gradientUnits="userSpaceOnUse">
      <stop stop-color="#082f49" stop-opacity="0.82" />
      <stop offset="1" stop-color="#10213c" stop-opacity="0.72" />
    </linearGradient>
    <linearGradient id="outputFill" x1="990" y1="98" x2="1148" y2="338" gradientUnits="userSpaceOnUse">
      <stop stop-color="#24144a" stop-opacity="0.84" />
      <stop offset="1" stop-color="#0c283d" stop-opacity="0.76" />
    </linearGradient>
    <radialGradient id="auraCyan" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(314 198) rotate(10) scale(318 174)">
      <stop stop-color="#22d3ee" stop-opacity="0.3" />
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="auraViolet" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(838 202) rotate(166) scale(390 190)">
      <stop stop-color="#a855f7" stop-opacity="0.25" />
      <stop offset="1" stop-color="#a855f7" stop-opacity="0" />
    </radialGradient>
    <filter id="flowGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="2.8" result="blur" />
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.24 0 0 0 0 0.78 0 0 0 0 1 0 0 0 0.46 0" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="safeGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="2.4" result="blur" />
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.16 0 0 0 0 0.82 0 0 0 0 0.56 0 0 0 0.42 0" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <marker id="arrowMain" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#a5f3fc" />
    </marker>
    <marker id="arrowSafe" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#86efac" />
    </marker>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" stroke="#7dd3fc" stroke-opacity="0.085" />
    </pattern>
  </defs>

  <rect width="1200" height="420" rx="30" fill="url(#bg)" />
  <rect x="13" y="13" width="1174" height="394" rx="26" fill="url(#surface)" stroke="#7dd3fc" stroke-opacity="0.16" />
  <rect x="13" y="13" width="1174" height="394" rx="26" fill="url(#grid)" opacity="0.72" />
  <rect x="13" y="13" width="1174" height="394" rx="26" fill="url(#auraCyan)" />
  <rect x="13" y="13" width="1174" height="394" rx="26" fill="url(#auraViolet)" />
  <path d="M248 238C364 206 466 234 596 202C736 168 838 118 1002 104" stroke="url(#systemPulse)" stroke-width="2" stroke-linecap="round" opacity="0.72" />
  <path d="M270 310C398 282 512 304 642 278C790 248 884 252 996 220" stroke="url(#systemPulse)" stroke-width="1.5" stroke-linecap="round" opacity="0.42" />

  <g font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="54" y="60" fill="#8ee9f6" font-size="16" font-weight="760">扫描 → 推荐 → 计划 → 审计</text>

    <g transform="translate(54 92)">
      <rect width="184" height="226" rx="18" fill="url(#inputFill)" stroke="#38bdf8" stroke-opacity="0.24" />
      <rect x="9" y="9" width="166" height="208" rx="14" fill="#071827" fill-opacity="0.28" stroke="#ffffff" stroke-opacity="0.05" />
      <text x="22" y="38" fill="#e0f2fe" font-size="17" font-weight="780">输入信号</text>
      <g font-size="13" font-weight="730" fill="#bae6fd">
        <g transform="translate(22 62)">
          <rect width="58" height="27" rx="9" fill="#08283f" stroke="#67e8f9" stroke-opacity="0.3" />
          <text x="29" y="18" text-anchor="middle">CPU</text>
        </g>
        <g transform="translate(94 62)">
          <rect width="58" height="27" rx="9" fill="#122147" stroke="#a78bfa" stroke-opacity="0.34" />
          <text x="29" y="18" text-anchor="middle">GPU</text>
        </g>
        <g transform="translate(22 101)">
          <rect width="58" height="27" rx="9" fill="#092f3b" stroke="#5eead4" stroke-opacity="0.3" />
          <text x="29" y="18" text-anchor="middle">RAM</text>
        </g>
        <g transform="translate(94 101)">
          <rect width="58" height="27" rx="9" fill="#08283f" stroke="#f59e0b" stroke-opacity="0.3" />
          <text x="29" y="18" fill="#fde68a" text-anchor="middle">Disk</text>
        </g>
        <g transform="translate(22 145)">
          <rect width="130" height="29" rx="10" fill="#071d32" stroke="#7dd3fc" stroke-opacity="0.22" />
          <text x="65" y="19" text-anchor="middle">Python · Git</text>
        </g>
        <g transform="translate(22 184)">
          <rect width="130" height="29" rx="10" fill="#071d32" stroke="#7dd3fc" stroke-opacity="0.22" />
          <text x="65" y="19" text-anchor="middle">Docker · WSL</text>
        </g>
      </g>
    </g>

    <g transform="translate(990 92)">
      <rect width="156" height="226" rx="18" fill="url(#outputFill)" stroke="#c084fc" stroke-opacity="0.25" />
      <rect x="9" y="9" width="138" height="208" rx="14" fill="#111331" fill-opacity="0.34" stroke="#ffffff" stroke-opacity="0.05" />
      <text x="22" y="38" fill="#f5f3ff" font-size="17" font-weight="800">审查输出</text>
      <g font-size="12.5" font-weight="720">
        <g transform="translate(22 65)">
          <rect width="122" height="28" rx="8" fill="#14163a" fill-opacity="0.82" stroke="#c084fc" stroke-opacity="0.24" />
          <text x="61" y="19" fill="#ede9fe" text-anchor="middle">Markdown / JSON</text>
        </g>
        <g transform="translate(22 112)">
          <rect width="122" height="28" rx="8" fill="#0d2631" fill-opacity="0.82" stroke="#5eead4" stroke-opacity="0.22" />
          <text x="61" y="19" fill="#ccfbf1" text-anchor="middle">计划 / 审计</text>
        </g>
        <g transform="translate(22 159)">
          <rect width="122" height="28" rx="8" fill="#0b2c2d" fill-opacity="0.82" stroke="#34d399" stroke-opacity="0.28" />
          <circle cx="16" cy="14" r="4.6" fill="#34d399" filter="url(#safeGlow)" />
          <text x="73" y="19" fill="#dcfce7" text-anchor="middle">dry-run 预览</text>
        </g>
      </g>
    </g>

    <g font-size="12" font-weight="760" letter-spacing="1.2">
      <rect x="314" y="88" width="108" height="24" rx="8" fill="#0b2740" stroke="#67e8f9" stroke-opacity="0.27" />
      <text x="368" y="105" fill="#bae6fd" text-anchor="middle">扫描</text>
      <rect x="497" y="88" width="122" height="24" rx="8" fill="#132044" stroke="#93c5fd" stroke-opacity="0.27" />
      <text x="558" y="105" fill="#dbeafe" text-anchor="middle">推荐</text>
      <rect x="704" y="88" width="88" height="24" rx="8" fill="#211640" stroke="#c084fc" stroke-opacity="0.28" />
      <text x="748" y="105" fill="#ede9fe" text-anchor="middle">计划</text>
      <rect x="874" y="88" width="88" height="24" rx="8" fill="#0d2d2d" stroke="#34d399" stroke-opacity="0.3" />
      <text x="918" y="105" fill="#bbf7d0" text-anchor="middle">审计</text>
    </g>

    <g>
      <g transform="translate(292 126)">
        <rect width="152" height="88" rx="16" fill="url(#cardFill)" stroke="#67e8f9" stroke-opacity="0.34" />
        <circle cx="29" cy="28" r="9" fill="#22d3ee" filter="url(#flowGlow)" />
        <text x="49" y="32" fill="#e0f2fe" font-size="16" font-weight="800">硬件扫描</text>
        <text x="24" y="64" fill="#bae6fd" font-size="12" font-weight="620">读取本机信息</text>
      </g>

      <g transform="translate(482 126)">
        <rect width="152" height="88" rx="16" fill="url(#cardFill)" stroke="#93c5fd" stroke-opacity="0.32" />
        <circle cx="29" cy="28" r="9" fill="#60a5fa" filter="url(#flowGlow)" />
        <text x="49" y="32" fill="#e0f2fe" font-size="16" font-weight="800">规则引擎</text>
        <text x="24" y="64" fill="#bfdbfe" font-size="12" font-weight="620">规则与风险提示</text>
      </g>

      <g transform="translate(672 126)">
        <rect width="152" height="88" rx="16" fill="url(#cardFill)" stroke="#a78bfa" stroke-opacity="0.34" />
        <circle cx="29" cy="28" r="9" fill="#a78bfa" filter="url(#flowGlow)" />
        <text x="49" y="32" fill="#f5f3ff" font-size="16" font-weight="800">推荐报告</text>
        <text x="24" y="64" fill="#ddd6fe" font-size="12" font-weight="620">评分与原因</text>
      </g>

      <g transform="translate(862 126)">
        <rect width="112" height="88" rx="16" fill="url(#cardFill)" stroke="#c084fc" stroke-opacity="0.34" />
        <circle cx="25" cy="28" r="9" fill="#c084fc" filter="url(#flowGlow)" />
        <text x="44" y="28" fill="#f5f3ff" font-size="13.2" font-weight="800">可审查</text>
        <text x="44" y="45" fill="#f5f3ff" font-size="13.2" font-weight="800">安装计划</text>
        <text x="22" y="70" fill="#ddd6fe" font-size="12" font-weight="620">仅生成文本</text>
      </g>
    </g>

    <g stroke="url(#mainFlow)" stroke-width="2.6" stroke-linecap="round" marker-end="url(#arrowMain)" filter="url(#flowGlow)">
      <path d="M246 170H287" />
      <path d="M446 170H477" />
      <path d="M636 170H667" />
      <path d="M826 170H857" />
      <path d="M976 170H987" />
    </g>
    <g fill="#bfdbfe" fill-opacity="0.9" font-size="18" font-weight="760">
      <text x="255" y="177">→</text>
      <text x="456" y="177">→</text>
      <text x="646" y="177">→</text>
      <text x="836" y="177">→</text>
      <text x="979" y="177">→</text>
    </g>

    <g transform="translate(292 258)">
      <rect width="682" height="84" rx="20" fill="#08241f" fill-opacity="0.4" stroke="#34d399" stroke-opacity="0.32" />
      <path d="M22 26H256M428 26H660" stroke="#5eead4" stroke-opacity="0.17" stroke-linecap="round" />
      <text x="24" y="30" fill="#a7f3d0" font-size="13" font-weight="790" letter-spacing="2">保护层</text>

      <g stroke="url(#safeFlow)" stroke-width="2.4" stroke-linecap="round" marker-end="url(#arrowSafe)" filter="url(#safeGlow)">
        <path d="M283 58H396" />
      </g>

      <g transform="translate(149 42)">
        <rect width="132" height="36" rx="12" fill="#071827" fill-opacity="0.9" stroke="#34d399" stroke-opacity="0.3" />
        <circle cx="20" cy="18" r="5.5" fill="#34d399" filter="url(#safeGlow)" />
        <text x="39" y="23" fill="#dcfce7" font-size="14" font-weight="780">安全审计</text>
      </g>
      <g transform="translate(401 42)">
        <rect width="132" height="36" rx="12" fill="#071827" fill-opacity="0.9" stroke="#f59e0b" stroke-opacity="0.28" />
        <circle cx="20" cy="18" r="5.5" fill="#5eead4" filter="url(#safeGlow)" />
        <text x="39" y="23" fill="#ccfbf1" font-size="14" font-weight="780">dry-run 预览</text>
      </g>
    </g>

    <g stroke="#86efac" stroke-opacity="0.24" stroke-width="1.3" stroke-dasharray="7 10" stroke-linecap="round">
      <path d="M748 218C748 238 748 244 748 258" />
      <path d="M918 218C918 238 918 244 918 258" />
      <path d="M918 342C940 342 970 322 990 292" />
    </g>

    <g opacity="0.5">
      <circle cx="632" cy="214" r="142" stroke="#67e8f9" stroke-opacity="0.1" />
      <circle cx="632" cy="214" r="98" stroke="#a78bfa" stroke-opacity="0.1" />
      <path d="M632 76V354M490 214H774" stroke="#7dd3fc" stroke-opacity="0.08" />
    </g>
  </g>
</svg>
